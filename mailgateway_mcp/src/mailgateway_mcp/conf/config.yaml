defaults:
  - mailgateway_app_config_schema
  - _self_

server:
  name: mailgateway-mcp
  transport: streamable-http
  host: 127.0.0.1
  port: 8000
  path: /mcp
  stateless_http: true
  json_response: true

hello:
  greeting: Hello
  default_name: world

smtp:
  host: localhost
  port: 587
  username: ""
  password: ""
  from_email: agent@example.com
  from_name: MailGateway
  starttls: true
  use_ssl: false
  verify_peer: true
  timeout_seconds: 30.0
